name: Render Blender assets

on:
  workflow_dispatch:
  push:
    paths:
      - 'tools/blender/**'
      - '.github/workflows/render-assets.yml'

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Blender
        run: |
          sudo apt-get update
          sudo apt-get install -y blender
          blender --version

      - name: Render ForgeKit construction system
        id: render_forgekit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          blender --background --factory-startup --python tools/blender/run_forgekit_compat.py 2>&1 | tee forgekit-render.log

      - name: Upload render diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgekit-render-log
          path: forgekit-render.log
          if-no-files-found: warn
          retention-days: 14

      - name: Stop after renderer failure
        if: steps.render_forgekit.outcome != 'success'
        run: |
          echo 'ForgeKit renderer failed. Last 120 log lines:'
          tail -n 120 forgekit-render.log || true
          exit 1

      - name: Verify ForgeKit output
        run: |
          test -d generated-assets/forgekit
          test -d generated-assets/forgekit/icons
          test -f generated-assets/forgekit/manifest.json
          echo "Full-size assets:"
          find generated-assets/forgekit -maxdepth 1 -name '*.png' -print
          echo "Inventory icons:"
          find generated-assets/forgekit/icons -maxdepth 1 -name '*.png' -print
          test "$(find generated-assets/forgekit -maxdepth 1 -name '*.png' | wc -l)" -eq 12
          test "$(find generated-assets/forgekit/icons -maxdepth 1 -name '*.png' | wc -l)" -eq 12

      - name: Upload ForgeKit asset library
        uses: actions/upload-artifact@v4
        with:
          name: forgekit-engineering-constructor-v1
          path: generated-assets/forgekit
          if-no-files-found: error
          retention-days: 14
