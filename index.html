<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#18130f" />
    <meta name="description" content="Физическая головоломка в духе The Incredible Machine." />
    <title>TIM 2.0 — Запусти мастерскую</title>
  </head>
  <body>
    <main id="app" class="game-shell">
      <div id="game-stage" class="game-stage" aria-label="Игровое поле"></div>

      <header class="hud-top">
        <section class="mission-chip panel">
          <span class="level-badge">01</span>
          <div>
            <h1>ЗАПУСТИ МАСТЕРСКУЮ</h1>
            <p id="objective-text">Установи три недостающие детали</p>
          </div>
        </section>

        <section class="timer-chip panel">
          <span>ВРЕМЯ</span>
          <b id="timer">00:00.0</b>
        </section>

        <nav class="top-controls" aria-label="Управление симуляцией">
          <button id="sound-button" class="round-button" type="button" aria-label="Звук">🔊</button>
          <button id="reset-button" class="round-button" type="button" aria-label="Сбросить">↻</button>
          <button id="run-button" class="play-button" type="button"><span>▶</span><b>ПУСК</b></button>
        </nav>
      </header>

      <div id="status-message" class="status-toast panel">Собери рабочую цепочку и запусти симуляцию.</div>

      <section class="build-tools panel" aria-label="Настройка детали">
        <button id="rotate-left" type="button" aria-label="Повернуть влево">↶</button>
        <button id="rotate-right" type="button" aria-label="Повернуть вправо">↷</button>
        <button id="hint-button" type="button" class="hint-button">ПОДСКАЗКА</button>
      </section>

      <footer class="parts-tray panel">
        <span class="tray-label">ДЕТАЛИ</span>
        <button class="part-card" data-part="guide" type="button">
          <span class="part-preview guide-preview"></span>
          <strong>НАПРАВЛЯЮЩАЯ</strong><em>×1</em>
        </button>
        <button class="part-card" data-part="rope" type="button">
          <span class="part-preview rope-preview"></span>
          <strong>ВЕРЁВКА</strong><em>×1</em>
        </button>
        <button class="part-card" data-part="weight" type="button">
          <span class="part-preview weight-preview"></span>
          <strong>ПРОТИВОВЕС</strong><em>×1</em>
        </button>
      </footer>

      <section id="result-card" class="result-card panel" aria-live="polite">
        <span class="result-icon">✓</span>
        <h2>МЕХАНИЗМ СРАБОТАЛ</h2>
        <p>Молоток ударил по колоколу.</p>
        <div class="stars">★ ★ ★</div>
        <button id="again-button" type="button">ПОВТОРИТЬ</button>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
