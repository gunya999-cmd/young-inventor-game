<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#e7edf3" />
    <meta name="description" content="Юный изобретатель — браузерная инженерная головоломка." />
    <title>Юный изобретатель</title>
  </head>
  <body>
    <main id="app">
      <header class="topbar" aria-label="Панель уровня">
        <div class="location-block">
          <div class="location-mark">⌂</div>
          <div>
            <div class="eyebrow">Глава 1 · Легомастерская</div>
            <div id="quest-counter" class="location-subtitle">Квест 1 из 10</div>
          </div>
        </div>
        <div class="quest-title">
          <strong id="quest-title">Замкни дорожку</strong>
          <span id="quest-objective">Поставь одну пластину между двумя дорожками</span>
        </div>
        <div class="controls">
          <button id="hint-button" class="button button-secondary" type="button">Подсказка</button>
          <button id="run-button" class="button button-primary" type="button">▶ Запуск</button>
          <button id="reset-button" class="button button-secondary button-icon" type="button" aria-label="Сбросить уровень">↻</button>
        </div>
      </header>

      <section id="game-shell" class="game-shell" aria-label="Игровое поле">
        <div id="game-container"></div>
        <div id="message-bubble" class="message-bubble"></div>
        <div id="result-card" class="result-card" hidden>
          <div class="result-icon">✓</div>
          <div class="result-text">
            <strong id="result-title">Готово!</strong>
            <span id="result-copy"></span>
          </div>
          <button id="next-button" class="button button-primary" type="button">Следующий квест →</button>
        </div>
      </section>

      <footer class="inventory-bar">
        <div class="mode-copy">
          <span class="status-dot"></span>
          <div>
            <strong id="mode-title">Режим сборки</strong>
            <span id="mode-copy">Выбери деталь и собери механизм</span>
          </div>
        </div>
        <div id="inventory" class="parts-list" aria-label="Доступные детали"></div>
        <div class="shortcut-hint"><span class="touch-copy">Перетащи · поверни двумя пальцами</span><span class="desktop-copy">Поворот <kbd>Q</kbd><kbd>E</kbd> · Запуск <kbd>Space</kbd></span></div>
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
