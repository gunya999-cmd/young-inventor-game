<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#16120f" />
    <meta name="description" content="Физическая головоломка в духе The Incredible Machine." />
    <title>TIM 2.0 — Запусти мастерскую</title>
  </head>
  <body>
    <main id="app" class="game-shell">
      <div id="game-stage" class="game-stage" aria-label="Игровое поле"></div>

      <section class="mission-panel glass-panel">
        <span class="eyebrow">ЭТАП 01</span>
        <h1>ЗАПУСТИ МАСТЕРСКУЮ</h1>
        <p>Собери недостающие связи и заставь молоток ударить по колоколу.</p>
        <div class="objective"><span></span><b id="objective-text">Установи 3 детали</b></div>
      </section>

      <nav class="top-controls" aria-label="Управление симуляцией">
        <button id="sound-button" class="round-button" type="button" aria-label="Звук">🔊</button>
        <button id="reset-button" class="round-button" type="button" aria-label="Сбросить">↻</button>
        <button id="run-button" class="play-button" type="button"><span>▶</span><b>ПУСК</b></button>
      </nav>

      <aside class="status-panel glass-panel">
        <div><span>ВРЕМЯ</span><b id="timer">00:00.0</b></div>
        <p id="status-message">Выберите детали снизу и установите их на поле.</p>
      </aside>

      <section class="build-tools glass-panel" aria-label="Настройка выбранной детали">
        <button id="rotate-left" type="button" title="Повернуть против часовой стрелки">↶</button>
        <button id="rotate-right" type="button" title="Повернуть по часовой стрелке">↷</button>
        <button id="hint-button" type="button" class="hint-button">ПОДСКАЗКА</button>
      </section>

      <footer class="parts-tray glass-panel">
        <div class="tray-title">
          <span>ДЕТАЛИ</span>
          <small>Нажми, затем настрой положение</small>
        </div>
        <button class="part-card" data-part="guide" type="button">
          <span class="part-preview guide-preview"></span>
          <strong>НАПРАВЛЯЮЩАЯ</strong>
          <em>×1</em>
        </button>
        <button class="part-card" data-part="rope" type="button">
          <span class="part-preview rope-preview"></span>
          <strong>ВЕРЁВКА</strong>
          <em>×1</em>
        </button>
        <button class="part-card" data-part="weight" type="button">
          <span class="part-preview weight-preview"></span>
          <strong>ГРУЗ РЫЧАГА</strong>
          <em>×1</em>
        </button>
      </footer>

      <section id="result-card" class="result-card glass-panel" aria-live="polite">
        <span class="result-icon">✓</span>
        <h2>МЕХАНИЗМ СРАБОТАЛ</h2>
        <p>Молоток передал достаточный импульс колоколу.</p>
        <div class="stars">★ ★ ★</div>
        <button id="again-button" type="button">ПОВТОРИТЬ ЭТАП</button>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
