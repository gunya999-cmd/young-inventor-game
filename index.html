<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#1b1713" />
    <meta name="description" content="Свободная физическая песочница в духе The Incredible Machine." />
    <title>TIM 2.0 — Песочница</title>
  </head>
  <body>
    <main id="app" class="game-shell">
      <div id="game-stage" class="game-stage" aria-label="Свободное игровое поле"></div>

      <header class="top-bar panel">
        <div class="brand-block">
          <span class="brand-mark">TIM</span>
          <div>
            <h1>ПЕСОЧНИЦА</h1>
            <p>Перетащи детали на поле и собери собственный механизм</p>
          </div>
        </div>
        <div id="mode-label" class="mode-chip">СБОРКА</div>
        <nav class="simulation-controls" aria-label="Управление симуляцией">
          <button id="run-button" class="primary-button" type="button">▶ ПУСК</button>
          <button id="pause-button" type="button" disabled>Ⅱ ПАУЗА</button>
          <button id="stop-button" type="button" disabled>■ СТОП</button>
          <button id="clear-button" type="button">ОЧИСТИТЬ</button>
        </nav>
      </header>

      <aside id="inspector" class="inspector panel" aria-label="Настройка выбранной детали">
        <button id="rotate-left" type="button" title="Повернуть влево">↶</button>
        <button id="rotate-right" type="button" title="Повернуть вправо">↷</button>
        <button id="fix-button" type="button">📍 ЗАКРЕПИТЬ</button>
        <button id="rope-button" type="button">〰 ВЕРЁВКА</button>
        <button id="delete-button" class="danger-button" type="button">⌫ УДАЛИТЬ</button>
      </aside>

      <div id="status-message" class="status-toast panel" aria-live="polite">
        Перетащи деталь из нижней панели на любое место поля.
      </div>

      <footer id="parts-palette" class="parts-palette panel" aria-label="Инвентарь деталей">
        <div class="palette-heading">
          <strong>ДЕТАЛИ</strong>
          <small>Тяни на поле</small>
        </div>
        <button class="palette-part" data-kind="ball" type="button">
          <span class="palette-icon ball-icon"></span><b>ШАР</b><small>свободный</small>
        </button>
        <button class="palette-part" data-kind="plank" type="button">
          <span class="palette-icon plank-icon"></span><b>ДОСКА</b><small>закреплена</small>
        </button>
        <button class="palette-part" data-kind="wall" type="button">
          <span class="palette-icon wall-icon"></span><b>СТЕНА</b><small>закреплена</small>
        </button>
        <button class="palette-part" data-kind="pulley" type="button">
          <span class="palette-icon pulley-icon"></span><b>БЛОК</b><small>точки верёвки</small>
        </button>
        <button class="palette-part" data-kind="weight" type="button">
          <span class="palette-icon weight-icon"></span><b>ГРУЗ</b><small>тяжёлый</small>
        </button>
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
