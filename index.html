<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1824" />
    <meta name="description" content="Современная браузерная головоломка в духе The Incredible Machine." />
    <title>Мастерская механизмов</title>
  </head>
  <body>
    <main id="app" class="app-shell">
      <header class="topbar">
        <div class="top-actions top-actions--left">
          <button class="icon-button" aria-label="Меню">☰</button>
          <button class="icon-button" aria-label="Помощь">?</button>
        </div>
        <section class="mission-card">
          <span>УРОВЕНЬ 1</span>
          <h1>ДОСТАВЬ ШАР В КОРЗИНУ</h1>
          <p>Используй предметы из ящика и собери работающий механизм.</p>
        </section>
        <div class="top-actions top-actions--right">
          <button id="run-button" class="action-button action-button--run">▶ <span>ЗАПУСК</span></button>
          <button id="reset-button" class="action-button">↶ <span>СБРОС</span></button>
          <button class="icon-button" aria-label="Настройки">☰</button>
        </div>
      </header>

      <aside class="inventory-panel">
        <h2>ВАШИ ПРЕДМЕТЫ</h2>
        <div id="inventory" class="inventory-list">
          <button class="inventory-item" data-part="plank-long"><span class="part-icon plank plank--long"></span><span>ДОСКА<br>ДЛИННАЯ</span><b>×2</b></button>
          <button class="inventory-item" data-part="plank-short"><span class="part-icon plank plank--short"></span><span>ДОСКА<br>КОРОТКАЯ</span><b>×2</b></button>
          <button class="inventory-item" data-part="spring"><span class="part-icon spring"></span><span>ПРУЖИНА</span><b>×1</b></button>
          <button class="inventory-item" data-part="lever"><span class="part-icon lever"></span><span>РЫЧАГ</span><b>×1</b></button>
          <button class="inventory-item" data-part="rope"><span class="part-icon rope"></span><span>ВЕРЁВКА</span><b>×2</b></button>
          <button class="inventory-item" data-part="weight"><span class="part-icon weight"></span><span>ГРУЗ</span><b>×2</b></button>
          <button class="inventory-item" data-part="fan"><span class="part-icon fan"></span><span>ВЕНТИЛЯТОР</span><b>×1</b></button>
        </div>
        <button id="delete-zone" class="delete-zone">🗑 <span>УДАЛИТЬ<br>ПРЕДМЕТ</span></button>
      </aside>

      <section id="workspace" class="workspace" aria-label="Игровое поле">
        <div class="wall-texture"></div>
        <div class="fixed-object start-ramp">
          <div class="metal-ball"></div>
          <div class="wood-plank"></div>
          <div class="metal-rail"></div>
        </div>
        <div class="fixed-object pulley-set pulley-set--left"><span class="pulley"></span><span class="rope-line rope-line--vertical"></span><span class="hanging-weight"></span></div>
        <div class="fixed-object lever-base"><span class="lever-arm"></span></div>
        <div class="fixed-object central-pulley"><span class="pulley"></span><span class="rope-line rope-line--diagonal"></span></div>
        <div class="fixed-object gear-platform"><span class="gear gear--large"></span><span class="gear gear--small"></span><span class="gear gear--tiny"></span></div>
        <div class="fixed-object spring-platform"><span class="coil"></span></div>
        <div class="fixed-object balloon"><span></span></div>
        <div class="fixed-object basket"><span class="basket-rim"></span><span class="basket-net"></span></div>
        <div class="floor-slab"></div>
        <div id="placed-layer" class="placed-layer"></div>
      </section>

      <footer class="toolbar">
        <div class="tool-group">
          <button class="tool-button active" data-tool="select">↖</button>
          <button class="tool-button" data-tool="move">✋</button>
          <button id="rotate-button" class="tool-button">⟳</button>
          <button class="tool-button">🔗</button>
          <button id="trash-button" class="tool-button">🗑</button>
        </div>
        <div class="tool-group tool-group--center">
          <button class="tool-button">○</button>
          <button class="tool-button">╱</button>
          <button class="tool-button">⛓</button>
          <button class="tool-button disabled">♟</button>
        </div>
        <div class="tool-group">
          <button class="tool-button">🔒</button>
          <button class="tool-button">⚙</button>
        </div>
        <button class="hint-button">☼ ПОДСКАЗКА <b>3</b></button>
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
